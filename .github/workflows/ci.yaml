name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - astro-migration

jobs:
  check:
    name: Typecheck, build & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check formatting
        run: npm run format:check
